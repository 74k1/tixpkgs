name: "Update request"
description: "A package is behind upstream."
title: "Update: PACKAGENAME OLDVERSION → NEWVERSION"
labels: ["0. request"]
assignees: 74k1
body:
  - type: "input"
    id: "pkg-name"
    attributes:
      label: "Package"
      description: "Which one?"
    validations:
      required: true
  - type: "input"
    id: "version"
    attributes:
      label: "Target version"
      description: "The version you'd like it updated to."
    validations:
      required: true
  - type: "input"
    id: "changelog"
    attributes:
      label: "Changelog"
      description: "Link, if one exists."
    validations:
      required: false
  - type: "textarea"
    id: "additional-context"
    attributes:
      label: "Anything else"
    validations:
      required: false
  - type: "textarea"
    id: "prioritisation"
    attributes:
      label: "Prioritisation"
      description: |
        ---
        **Don't edit this.** Use 👍 reactions on issues to help prioritize.
      value: |
        Add a 👍 [reaction] to [issues you care about].

        [reaction]: https://github.blog/2016-03-10-add-reactions-to-pull-requests-issues-and-comments/
        [issues you care about]: https://github.com/74k1/tixpkgs/issues?q=is%3Aissue+is%3Aopen+sort%3Areactions-%2B1-desc
