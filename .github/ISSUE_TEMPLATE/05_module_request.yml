name: "Module request"
description: "Want a NixOS module for an existing package."
title: "Module Request: MODULENAME"
labels: ["0. request"]
assignees: 74k1
body:
  - type: "input"
    id: "module-name"
    attributes:
      label: "Module"
      description: "Which package should this module wrap?"
    validations:
      required: true
  - type: "textarea"
    id: "description"
    attributes:
      label: "What should it do?"
      description: "Describe the module, or sketch out how you'd want to use it in your config."
    validations:
      required: true
  - type: "input"
    id: "docs"
    attributes:
      label: "Relevant docs"
      description: "Link to upstream documentation, if any."
    validations:
      required: false
  - type: "textarea"
    id: "additional-context"
    attributes:
      label: "Anything else"
    validations:
      required: false
  - type: "textarea"
    id: "prioritisation"
    attributes:
      label: "Prioritisation"
      description: |
        ---
        **Don't edit this.** Use 👍 reactions on issues to help prioritize.
      value: |
        Add a 👍 [reaction] to [issues you care about].

        [reaction]: https://github.blog/2016-03-10-add-reactions-to-pull-requests-issues-and-comments/
        [issues you care about]: https://github.com/74k1/tixpkgs/issues?q=is%3Aissue+is%3Aopen+sort%3Areactions-%2B1-desc
