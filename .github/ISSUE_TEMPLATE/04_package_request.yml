name: "Package request"
description: "Something's missing from nixpkgs and you want it here."
title: "Package Request: PACKAGENAME"
labels: ["0. request"]
assignees: 74k1
body:
  - type: "input"
    id: "pkg-name"
    attributes:
      label: "Package"
      description: "Name of the software."
    validations:
      required: true
  - type: "input"
    id: "source"
    attributes:
      label: "Source"
      description: "Link to the repo or project page."
    validations:
      required: true
  - type: "textarea"
    id: "context"
    attributes:
      label: "Why here and not nixpkgs or nix-community?"
      description: "Just out of curiosity."
    validations:
      required: false
  - type: "textarea"
    id: "additional-context"
    attributes:
      label: "Anything else"
    validations:
      required: false
  - type: "textarea"
    id: "prioritisation"
    attributes:
      label: "Prioritisation"
      description: |
        ---
        **Don't edit this.** Use 👍 reactions on issues to help prioritize.
      value: |
        Add a 👍 [reaction] to [issues you care about].

        [reaction]: https://github.blog/2016-03-10-add-reactions-to-pull-requests-issues-and-comments/
        [issues you care about]: https://github.com/74k1/tixpkgs/issues?q=is%3Aissue+is%3Aopen+sort%3Areactions-%2B1-desc
