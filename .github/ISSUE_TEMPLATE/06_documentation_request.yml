name: "Documentation"
description: "Something's undocumented or poorly documented."
title: "Docs: MODULENAME/PACKAGENAME"
labels: ["0. request"]
assignees: 74k1
body:
  - type: "input"
    id: "name"
    attributes:
      label: "Package / Module"
      description: "What's missing documentation?"
    validations:
      required: true
  - type: "textarea"
    id: "proposal"
    attributes:
      label: "Draft"
      description: "Even better if you write it yourself. PRs welcome."
      render: "markdown"
    validations:
      required: false
  - type: "textarea"
    id: "additional-context"
    attributes:
      label: "Anything else"
    validations:
      required: false
  - type: "textarea"
    id: "prioritisation"
    attributes:
      label: "Prioritisation"
      description: |
        ---
        **Don't edit this.** Use 👍 reactions on issues to help prioritize.
      value: |
        Add a 👍 [reaction] to [issues you care about].

        [reaction]: https://github.blog/2016-03-10-add-reactions-to-pull-requests-issues-and-comments/
        [issues you care about]: https://github.com/74k1/tixpkgs/issues?q=is%3Aissue+is%3Aopen+sort%3Areactions-%2B1-desc
